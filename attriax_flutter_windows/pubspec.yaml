name: attriax_flutter_windows
description: Windows implementation for the Attriax Flutter plugin.
version: 0.1.0
homepage: https://attriax.com
repository: https://github.com/attriax/sdk-flutter
issue_tracker: https://github.com/attriax/sdk-flutter/issues
topics:
  - attribution
  - deep-linking
  - analytics
  - sdk-flutter

environment:
  sdk: ^3.8.0
  flutter: ">=3.29.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      windows:
        pluginClass: AttriaxFlutterWindowsPluginCApi
