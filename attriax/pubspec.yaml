name: attriax_flutter
description: Attriax SDK for Flutter - A powerful and easy-to-use solution for mobile attribution, deep-linking, and analytics.
version: 0.2.0
homepage: https://attriax.com
repository: https://github.com/attriax/sdk-flutter
issue_tracker: https://github.com/attriax/sdk-flutter/issues
topics:
  - attribution
  - deep-linking
  - analytics
  - sdk-flutter

false_secrets:
  - /example/android/app/google-services.json
  - /example/lib/firebase_options.dart

environment:
  sdk: ^3.8.0
  flutter: ">=3.29.0"

resolution: workspace

flutter:
  plugin:
    platforms:
      android:
        default_package: attriax_flutter_android
      ios:
        default_package: attriax_flutter_ios
      macos:
        default_package: attriax_flutter_ios
      windows:
        default_package: attriax_flutter_windows
      web:
        pluginClass: AttriaxWebPlugin
        fileName: src/internal/attriax_web_platform.dart

dependencies:
  attriax_api_client: ^0.2.0
  attriax_flutter_android: ^0.2.0
  attriax_flutter_ios: ^0.2.0
  attriax_flutter_platform_interface: ^0.2.0
  attriax_flutter_windows: ^0.2.0
  connectivity_plus: ^7.1.1
  dio: ^5.7.0
  flutter:
    sdk: flutter
  http: ^1.3.0
  shared_preferences: ^2.5.5
  web: ^1.1.1

dev_dependencies:
  connectivity_plus_platform_interface: ^2.1.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
