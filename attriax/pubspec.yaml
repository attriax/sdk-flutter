name: attriax_flutter
description: Attriax SDK for Flutter - A powerful and easy-to-use solution for mobile attribution, deep-linking, and analytics.
version: 0.6.0
homepage: https://attriax.com
repository: https://github.com/attriax/sdk-flutter
issue_tracker: https://github.com/attriax/sdk-flutter/issues
topics:
  - attribution
  - deep-linking
  - analytics
  - sdk-flutter

false_secrets:
  - /example/android/app/google-services.json
  - /example/lib/firebase_options.dart

environment:
  sdk: ^3.8.0
  flutter: ">=3.29.0"

resolution: workspace

flutter:
  plugin:
    platforms:
      android:
        default_package: attriax_flutter_android
      ios:
        default_package: attriax_flutter_ios
      macos:
        default_package: attriax_flutter_ios
      windows:
        default_package: attriax_flutter_windows
      linux:
        default_package: attriax_flutter_linux
      web:
        default_package: attriax_flutter_web

dependencies:
  attriax_flutter_android: ^0.6.0
  attriax_flutter_ios: ^0.6.0
  attriax_flutter_linux: ^0.6.0
  attriax_flutter_platform_interface: ^0.6.0
  attriax_flutter_web: ^0.6.0
  attriax_flutter_windows: ^0.6.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
