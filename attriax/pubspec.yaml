name: attriax
description: Attriax mobile attribution SDK for Flutter.
version: 0.0.1
homepage: https://attriax.com
repository: https://github.com/attriax/flutter-plugin
issue_tracker: https://github.com/attriax/flutter-plugin/issues
topics:
  - attribution
  - deep-linking
  - analytics
  - flutter-plugin

environment:
  sdk: ^3.8.0
  flutter: ">=3.29.0"

resolution: workspace

flutter:
  plugin:
    platforms:
      android:
        default_package: attriax_android
      ios:
        default_package: attriax_ios

dependencies:
  attriax_android: ^0.0.1
  attriax_ios: ^0.0.1
  attriax_platform_interface: ^0.0.1
  connectivity_plus: ^7.1.1
  device_info_plus: ^13.1.0
  flutter:
    sdk: flutter
  http: ^1.3.0
  package_info_plus: ^10.1.0
  shared_preferences: ^2.5.5

dev_dependencies:
  connectivity_plus_platform_interface: ^2.1.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
