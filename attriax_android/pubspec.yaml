name: attriax_android
description: Android implementation of the Attriax plugin.
version: 0.0.1
homepage: https://attriax.com
repository: https://github.com/attriax/flutter-plugin
issue_tracker: https://github.com/attriax/flutter-plugin/issues
topics:
  - attribution
  - android
  - flutter-plugin

environment:
  sdk: ^3.8.0
  flutter: ">=3.29.0"

resolution: workspace

flutter:
  plugin:
    implements: attriax
    platforms:
      android:
        package: com.attriax.attriax_android
        pluginClass: AttriaxAndroidPlugin

dependencies:
  attriax_platform_interface: ^0.0.1
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
