name: attriax_flutter_rich_example
description: Rich public demo app for the Attriax Flutter SDK.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  attriax_flutter:
    path: ../attriax
  attriax_flutter_platform_interface:
    path: ../attriax_flutter_platform_interface
  firebase_core: ^4.8.0
  firebase_messaging: ^16.2.1
  share_plus: ^13.1.0

dev_dependencies:
  attriax_api_client:
    path: ../attriax_api_client
  connectivity_plus: ^7.1.1
  connectivity_plus_platform_interface: ^2.0.1
  flutter_driver:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  http: ^1.3.0
  integration_test:
    sdk: flutter
  shared_preferences: ^2.5.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/attriax-logo.png
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/branding/attriax-logo.png
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: assets/branding/attriax-logo.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/branding/attriax-logo.png

flutter:
  uses-material-design: true