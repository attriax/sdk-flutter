name: attriax_flutter_linux
description: Linux implementation for the Attriax Flutter plugin.
version: 0.5.0
homepage: https://attriax.com
repository: https://github.com/attriax/sdk-flutter
issue_tracker: https://github.com/attriax/sdk-flutter/issues
topics:
  - attribution
  - deep-linking
  - analytics
  - sdk-flutter

environment:
  sdk: ^3.8.0
  flutter: ">=3.29.0"

resolution: workspace

dependencies:
  attriax_flutter_platform_interface: ^0.5.0
  ffi: ^2.1.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    implements: attriax_flutter
    platforms:
      linux:
        # Dart-only registration (sets AttriaxPlatform.instance) plus a native
        # build step that bundles the prebuilt KMP C-ABI core shared library
        # (`libattriax_core.so`) into the app bundle. The binding itself is
        # dart:ffi over that .so.
        dartPluginClass: AttriaxLinux
        ffiPlugin: true
