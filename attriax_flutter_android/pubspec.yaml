name: attriax_flutter_android
description: Android implementation of the Attriax plugin.
version: 0.2.0
homepage: https://attriax.com
repository: https://github.com/attriax/sdk-flutter
issue_tracker: https://github.com/attriax/sdk-flutter/issues
topics:
  - attribution
  - android
  - sdk-flutter

environment:
  sdk: ^3.8.0
  flutter: ">=3.29.0"

resolution: workspace

flutter:
  plugin:
    implements: attriax_flutter
    platforms:
      android:
        package: com.attriax.attriax_flutter_android
        pluginClass: AttriaxAndroidPlugin

dependencies:
  attriax_flutter_platform_interface: ^0.2.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
